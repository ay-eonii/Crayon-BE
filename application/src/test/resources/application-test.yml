spring:
  datasource:
    url: jdbc:h2:mem:test;NON_KEYWORDS=user;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/crayon-test
      uuid-representation: standard
    redis:
      host: localhost
      port: 6379
      password: ""
